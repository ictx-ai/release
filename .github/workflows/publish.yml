name: Publish Release

# Manual / emergency publish for ictx binary tarballs (curl + GitHub REST API only).
#
# Primary flow: ictx-ai/ictx tag CI builds tarballs and publishes here automatically.
#
# Place tarballs in dist/ before running, or attach via a prior artifact download step.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.5.0). The release will be created with this tag."
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release?"
        required: false
        default: false
        type: boolean
      name:
        description: "Human friendly release name (optional)"
        required: false
        type: string

  repository_dispatch:
    types: [publish-release]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve inputs
        id: inputs
        run: |
          VERSION="${{ github.event.inputs.version || github.event.client_payload.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: version is required" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          PRERELEASE="${{ github.event.inputs.prerelease || github.event.client_payload.prerelease || 'false' }}"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

          NAME="${{ github.event.inputs.name || github.event.client_payload.name || '' }}"
          if [[ -z "$NAME" ]]; then
            NAME="ictx ${VERSION}"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download assets from calling workflow artifacts (if provided)
        if: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.artifact_run_id != '' }}
        uses: actions/download-artifact@v7
        with:
          run-id: ${{ github.event.client_payload.artifact_run_id }}
          path: dist
          merge-multiple: true

      - name: Collect dist tarballs
        run: |
          mkdir -p dist
          find . -name 'ictx-*.tar.gz' -not -path './dist/*' -exec cp {} dist/ \; 2>/dev/null || true
          ls -lh dist/ || true

      - name: Write release notes
        run: |
          cat > release-notes.md <<EOF
          ictx ${{ steps.inputs.outputs.version }}

          Install:
          curl -fsSL https://raw.githubusercontent.com/ictx-ai/release/main/install.sh | bash

          Prerequisites: Java 17+, opengrep (or semgrep) on PATH.

          See README.md for manual tarball install.
          EOF

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/ictx-*.tar.gz)
          args=(
            --repo "${{ github.repository }}"
            --tag "${{ steps.inputs.outputs.tag }}"
            --title "${{ steps.inputs.outputs.name }}"
            --notes-file release-notes.md
          )
          if [[ "${{ steps.inputs.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "WARN: no tarballs in dist/ — creating release without assets"
            ./scripts/github-release-publish.sh "${args[@]}"
          else
            ./scripts/github-release-publish.sh "${args[@]}" "${assets[@]}"
          fi
