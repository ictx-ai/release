name: Publish Release

# Publishes ictx binary tarballs using this repo's GITHUB_TOKEN only.
#
# Primary flow: ictx-ai/ictx tag CI builds artifacts, then repository_dispatch
# triggers this workflow with version + workflow run id.
#
# Manual: Actions → Run workflow → enter version (tarballs must already be in dist/).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.5.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release?"
        required: false
        default: false
        type: boolean
      name:
        description: "Human friendly release name (optional)"
        required: false
        type: string

  repository_dispatch:
    types: [publish-release]

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve inputs
        id: inputs
        run: |
          VERSION="${{ github.event.inputs.version || github.event.client_payload.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: version is required" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          PRERELEASE="${{ github.event.inputs.prerelease || github.event.client_payload.prerelease || 'false' }}"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

          NAME="${{ github.event.inputs.name || github.event.client_payload.name || '' }}"
          if [[ -z "$NAME" ]]; then
            NAME="ictx ${VERSION}"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

          SOURCE_REPO="${{ github.event.client_payload.repository || 'ictx-ai/ictx' }}"
          echo "source_repo=${SOURCE_REPO}" >> "$GITHUB_OUTPUT"

          RUN_ID="${{ github.event.client_payload.run_id || '' }}"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts from ictx monorepo
        if: ${{ steps.inputs.outputs.run_id != '' }}
        uses: actions/download-artifact@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ steps.inputs.outputs.source_repo }}
          run-id: ${{ steps.inputs.outputs.run_id }}
          pattern: ictx-*
          path: dist
          merge-multiple: true

      - name: Collect dist tarballs
        run: |
          mkdir -p dist
          find . -name 'ictx-*.tar.gz' -not -path './dist/*' -exec cp {} dist/ \; 2>/dev/null || true
          ls -lh dist/ || true

      - name: Write release notes
        run: |
          cat > release-notes.md <<EOF
          ictx ${{ steps.inputs.outputs.version }}

          Install:
          curl -fsSL https://raw.githubusercontent.com/ictx-ai/release/main/install.sh | bash

          Platform tarballs (ignore any GitHub "Source code" entries):
          - ictx-${{ steps.inputs.outputs.version }}-linux-x86_64.tar.gz
          - ictx-${{ steps.inputs.outputs.version }}-linux-aarch64.tar.gz
          - ictx-${{ steps.inputs.outputs.version }}-darwin-aarch64.tar.gz

          Prerequisites: Java 17+, opengrep (or semgrep) on PATH.
          EOF

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/ictx-*.tar.gz)
          args=(
            --repo "${{ github.repository }}"
            --tag "${{ steps.inputs.outputs.tag }}"
            --title "${{ steps.inputs.outputs.name }}"
            --notes-file release-notes.md
          )
          if [[ "${{ steps.inputs.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "ERROR: no tarballs in dist/"
            exit 1
          fi
          ./scripts/github-release-publish.sh "${args[@]}" "${assets[@]}"
